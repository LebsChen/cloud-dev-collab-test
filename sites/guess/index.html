<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>猜数字游戏</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>猜数字游戏</h1>
    <p class="hint">我想好了一个 1 到 100 之间的数字，来猜猜看吧！</p>
    <form id="guess-form">
      <input id="guess-input" type="number" min="1" max="100" placeholder="输入 1-100" autocomplete="off" required />
      <button type="submit" id="guess-btn">猜！</button>
    </form>
    <p id="feedback" class="feedback" aria-live="polite"></p>
    <p class="count">猜测次数：<span id="count">0</span></p>
    <button id="restart-btn" type="button" class="restart" hidden>重新开始</button>
  </main>
  <script src="app.js"></script>
</body>
</html>
