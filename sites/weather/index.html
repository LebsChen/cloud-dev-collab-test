<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气卡片</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>城市天气一览</h1>
    <p class="subtitle">今日天气速览（静态示例数据）</p>
    <section class="cards">
      <article class="card card-sunny">
        <div class="icon" aria-hidden="true">☀️</div>
        <h2 class="city">北京</h2>
        <p class="temp">28°C</p>
        <p class="desc">晴</p>
        <div class="meta">
          <span>湿度 40%</span>
          <span>西北风 3 级</span>
        </div>
      </article>
      <article class="card card-cloudy">
        <div class="icon" aria-hidden="true">⛅</div>
        <h2 class="city">上海</h2>
        <p class="temp">24°C</p>
        <p class="desc">多云</p>
        <div class="meta">
          <span>湿度 65%</span>
          <span>东南风 2 级</span>
        </div>
      </article>
      <article class="card card-rainy">
        <div class="icon" aria-hidden="true">🌧️</div>
        <h2 class="city">广州</h2>
        <p class="temp">26°C</p>
        <p class="desc">小雨</p>
        <div class="meta">
          <span>湿度 85%</span>
          <span>南风 2 级</span>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
